name: GitHub Metrics

on:
  schedule:
    - cron: "0 * * * *"     # Runs every hour
  workflow_dispatch:         # Allows manual run
  push:
    branches:
      - main                 # Regenerate on every push to main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: semmozhiyan-dev
          template: classic
          base: header, activity, community, repositories, metadata
          output_action: commit
          committer_message: "chore: update github-metrics.svg [skip ci]"
          filename: github-metrics.svg

          config_timezone: Asia/Kolkata
          config_display: large
          config_octicon: yes
          config_padding: 10%

          # 🗓 Contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 💻 Languages usage
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_indepth: yes

          # 📈 Recent activity
          plugin_activity: yes
          plugin_activity_limit: 10
          plugin_activity_days: 14
          plugin_activity_filter: push, pr, issue, comment, fork, star

          # 📊 Lines of code changed
          plugin_lines: yes
          plugin_lines_history_limit: 1

          # 🔄 Follow-up issues & PRs
          plugin_followup: yes
          plugin_followup_indepth: yes

          # ⏱ Coding habits & hours
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          plugin_habits_from: ghapi

          # 🏷 Topics worked on
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons

          # ⭐ Starred repositories
          plugin_stars: yes
          plugin_stars_limit: 4

          # 📦 Highlight your best repos
          plugin_repositories: yes
          plugin_repositories_featured: semmozhiyan-dev/wanderlite-travel-and-tourism,semmozhiyan-dev/semmozhi-portfolio

          # 👥 Followers & contributors
          plugin_people: yes
          plugin_people_types: followers, contributors
          plugin_people_limit: 24
          plugin_people_identicons: yes

          # 📅 Commit calendar
          plugin_calendar: yes
          plugin_calendar_limit: 1

          # 🏅 Achievements
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 6
